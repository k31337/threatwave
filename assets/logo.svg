<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="34%" r="60%">
      <stop offset="0%" stop-color="#ff3b30" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ff3b30" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Unifying card so the mark reads on any background -->
  <rect x="50" y="30" width="800" height="440" rx="20" fill="#111114" stroke="#232326" stroke-width="2"/>
  <rect x="50" y="30" width="800" height="440" rx="20" fill="url(#bgGlow)"/>

  <!-- Woven web mark -->
  <g transform="translate(450,205)" filter="url(#softShadow)" stroke-linecap="round">
    <!-- radial spokes -->
    <g stroke="#3a3a40" stroke-width="1.6">
      <line x1="0" y1="0" x2="0" y2="-135"/>
      <line x1="0" y1="0" x2="117" y2="-67.5"/>
      <line x1="0" y1="0" x2="117" y2="67.5"/>
      <line x1="0" y1="0" x2="0" y2="135"/>
      <line x1="0" y1="0" x2="-117" y2="67.5"/>
      <line x1="0" y1="0" x2="-117" y2="-67.5"/>
    </g>

    <!-- concentric hex web rings -->
    <g fill="none" stroke="#4a4a52" stroke-width="1.4">
      <polygon points="0,-45 39,-22.5 39,22.5 0,45 -39,22.5 -39,-22.5"/>
      <polygon points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45"/>
      <polygon points="0,-135 117,-67.5 117,67.5 0,135 -117,67.5 -117,-67.5"/>
    </g>

    <!-- correlation threads cutting across the web -->
    <path d="M -117,-67.5 L 39,22.5 L 117,67.5" fill="none" stroke="#ff5145" stroke-width="3"/>
    <path d="M 0,-135 L -39,22.5" fill="none" stroke="#ff5145" stroke-width="3" opacity="0.9"/>

    <!-- data-point nodes -->
    <circle cx="-117" cy="-67.5" r="7" fill="#c9c9cf"/>
    <circle cx="0" cy="-135" r="7" fill="#c9c9cf"/>
    <circle cx="117" cy="67.5" r="7" fill="#c9c9cf"/>
    <circle cx="-39" cy="22.5" r="7" fill="#c9c9cf"/>
    <circle cx="0" cy="0" r="6" fill="#ff5145"/>

    <!-- highlighted correlated node -->
    <circle cx="39" cy="22.5" r="10" fill="#ff5145"/>
    <circle cx="39" cy="22.5" r="18" fill="none" stroke="#ff5145" stroke-width="1.6" opacity="0.55">
      <animate attributeName="r" values="14;22;14" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="450" y="410" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#f2f2f4" letter-spacing="1">ThreatWeave</text>
  <text x="450" y="445" text-anchor="middle" font-family="Consolas, 'SF Mono', monospace" font-size="16" fill="#8a8a90" letter-spacing="3">THREAT INTELLIGENCE KNOWLEDGE GRAPH</text>
</svg>
